<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PriceSnap - UK Price Comparison</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .condition-tabs { display: flex; gap: 0.5rem; border-bottom: 1px solid #e5e7eb; margin-bottom: 1rem; }
    .condition-tab { padding: 0.5rem 1rem; border-radius: 0.5rem 0.5rem 0 0; cursor: pointer; font-size: 0.875rem; color: #6b7280; background: #f3f4f6; }
    .condition-tab.active { background: #dbeafe; color: #1e40af; font-weight: 600; }
    .tab-count { background: #e5e7eb; color: #374151; padding: 0 0.5rem; border-radius: 9999px; font-size: 0.75rem; margin-left: 0.25rem; }
    .condition-tab.active .tab-count { background: #1e40af; color: white; }
    .store-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-green { background: #22c55e; } .dot-orange { background: #f97316; } .dot-red { background: #ef4444; }
    .ai-card { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 0.75rem; padding: 1rem; }
    .confidence-bar { background: #dbeafe; height: 6px; border-radius: 3px; overflow: hidden; }
    .confidence-fill { background: #2563eb; height: 100%; }
    .category-btn { padding: 0.5rem 1rem; border-radius: 9999px; font-size: 0.875rem; transition: all 0.2s; white-space: nowrap; }
    .category-btn-active { background: #111827; color: white; }
    .category-btn-inactive { background: #f3f4f6; color: #374151; }
    .category-btn-inactive:hover { background: #e5e7eb; }
    .bnpl-badge { display: inline-flex; align-items: center; gap: 0.25rem; background: #dcfce7; color: #166534; font-size: 0.75rem; padding: 0.125rem 0.5rem; border-radius: 9999px; font-weight: 500; }
    .hot-deals-wrapper { background: linear-gradient(135deg, #dc2626, #b91c1c); }
    .trending-wrapper { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .recently-viewed-wrapper { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
    .hot-badge { position: absolute; top: 0.5rem; left: 0.5rem; background: #dc2626; color: white; font-size: 0.625rem; font-weight: bold; padding: 0.25rem 0.5rem; border-radius: 0.25rem; }
  </style>

<body class="bg-gray-50">
  <header class="bg-white shadow-sm sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-gradient-to-br from-green-500 to-green-600 rounded-lg flex items-center justify-center"><i class="fa-solid fa-tags text-white text-sm"></i></div>
        <div><h1 class="font-bold text-gray-900 text-lg">PriceSnap</h1><p class="text-xs text-gray-500">SNAP UP THE BEST DEALS</p></div>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="alert('Login coming soon')" class="text-sm text-gray-600 hover:text-gray-900">Login</button>
        <button onclick="alert('Sign up coming soon')" class="text-sm bg-gray-900 text-white px-4 py-2 rounded-lg hover:opacity-90">Sign Up</button>
      </div>
    </div>
  </header>

  <div class="bg-white border-b sticky top-[60px] z-30">
    <div class="max-w-7xl mx-auto px-4 py-3">
      <div class="flex gap-2 overflow-x-auto no-scrollbar" id="categoryTabs">
        <button class="category-btn category-btn-active" data-category="All">All</button>
        <button class="category-btn category-btn-inactive" data-category="HotDeals"><i class="fa-solid fa-fire text-orange-500"></i> Hot Deals <span id="hotCount" class="ml-1 text-xs bg-orange-500 text-white px-1.5 rounded-full">0</span></button>
        <button class="category-btn category-btn-inactive" data-category="Trending"><i class="fa-solid fa-chart-line text-yellow-500"></i> Trending <span id="trendCount" class="ml-1 text-xs bg-yellow-500 text-white px-1.5 rounded-full">0</span></button>
        <button class="category-btn category-btn-inactive" data-category="Tech">Tech</button>
        <button class="category-btn category-btn-inactive" data-category="Gaming">Gaming</button>
        <button class="category-btn category-btn-inactive" data-category="Appliances">Appliances</button>
        <button class="category-btn category-btn-inactive" data-category="Bedroom">Bedroom</button>
        <button class="category-btn category-btn-inactive" data-category="Living Room">Living Room</button>
        <button class="category-btn category-btn-inactive" data-category="Kids">Kids</button>
        <button class="category-btn category-btn-inactive" data-category="Garden">Garden</button>
      </div>
    </div>
  </div>

  <main class="max-w-7xl mx-auto px-4 py-6">
    <div id="resultsInfo" class="text-sm text-gray-600 mb-4">Found 0 deals in All</div>
    
    <div id="hotDealsSection" class="hot-deals-wrapper rounded-xl p-4 mb-6 text-white hidden">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xl font-bold"><i class="fa-solid fa-fire"></i> HOT DEALS - LIMITED TIME</h2>
        <div class="flex gap-2"><button onclick="scrollRow('hotDealsContainer',-300)" class="bg-white/20 p-2 rounded-lg"><i class="fa-solid fa-chevron-left"></i></button><button onclick="scrollRow('hotDealsContainer',300)" class="bg-white/20 p-2 rounded-lg"><i class="fa-solid fa-chevron-right"></i></button></div>
      </div>
      <div id="hotDealsContainer" class="flex gap-4 overflow-x-auto no-scrollbar pb-2"></div>
    </div>

    <div id="trendingSection" class="trending-wrapper rounded-xl p-4 mb-6 text-white hidden">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xl font-bold"><i class="fa-solid fa-chart-line"></i> TRENDING NOW</h2>
        <div class="flex gap-2"><button onclick="scrollRow('trendingContainer',-300)" class="bg-white/20 p-2 rounded-lg"><i class="fa-solid fa-chevron-left"></i></button><button onclick="scrollRow('trendingContainer',300)" class="bg-white/20 p-2 rounded-lg"><i class="fa-solid fa-chevron-right"></i></button></div>
      </div>
      <div id="trendingContainer" class="flex gap-4 overflow-x-auto no-scrollbar pb-2"></div>
    </div>

    <div id="recentlyViewedSection" class="recently-viewed-wrapper rounded-xl p-4 mb-6 text-white hidden">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xl font-bold"><i class="fa-solid fa-clock-rotate-left"></i> RECENTLY VIEWED</h2>
        <div class="flex gap-2"><button onclick="scrollRow('recentContainer',-300)" class="bg-white/20 p-2 rounded-lg"><i class="fa-solid fa-chevron-left"></i></button><button onclick="scrollRow('recentContainer',300)" class="bg-white/20 p-2 rounded-lg"><i class="fa-solid fa-chevron-right"></i></button></div>
      </div>
      <div id="recentContainer" class="flex gap-4 overflow-x-auto no-scrollbar pb-2"></div>
    </div>

    <div id="productsContainer"><div class="text-center py-12 text-gray-500">No products found.</div></div>
  </main>

  <div id="productModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4" onclick="closeModal(event)">
    <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
      <div id="modalContent"></div>
    </div>
  </div>

<script>
let allProducts = []; let groupedProducts = {}; let currentCategory = 'All'; let favourites = JSON.parse(localStorage.getItem('favourites') || '[]'); let watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]'); let recentlyViewed = JSON.parse(localStorage.getItem('recentlyViewed') || '[]'); let activeConditionTab = 'all'; 

document.addEventListener('DOMContentLoaded', async () => {
  await loadProducts();
  setupCategoryTabs();
  renderProducts();
});

async function loadProducts() {
  try {
    const res = await fetch('/api/products');
    const data = await res.json();
    allProducts = data.products || [];
    document.getElementById('hotCount').textContent = allProducts.filter(p => p.isHotDeal).length;
    document.getElementById('trendCount').textContent = allProducts.filter(p => p.isTrending).length;
  } catch(e) { console.error(e); allProducts = []; }
}

function setupCategoryTabs() {
  document.querySelectorAll('.category-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.category-btn').forEach(b => b.className = 'category-btn category-btn-inactive');
      btn.className = 'category-btn category-btn-active';
      currentCategory = btn.dataset.category;
      renderProducts();
    };
  });
}

function renderProducts() {
  const container = document.getElementById('productsContainer');
  const info = document.getElementById('resultsInfo');
  const hotDealsSec = document.getElementById('hotDealsSection');
  const trendingSec = document.getElementById('trendingSection');
  const recentSec = document.getElementById('recentlyViewedSection');
  
  let products = [...allProducts];
  let hotDeals = allProducts.filter(p => p.isHotDeal);
  let trending = allProducts.filter(p => p.isTrending);
  let recent = allProducts.filter(p => recentlyViewed.includes(p.id));
  
  if (currentCategory === 'HotDeals') {
    products = hotDeals;
    hotDealsSec.classList.remove('hidden'); trendingSec.classList.add('hidden'); recentSec.classList.add('hidden');
    info.textContent = `Hot Deals (${products.length})`;
  } else if (currentCategory === 'Trending') {
    products = trending;
    trendingSec.classList.remove('hidden'); hotDealsSec.classList.add('hidden'); recentSec.classList.add('hidden');
    info.textContent = `Trending Now (${products.length})`;
  } else {
    if (currentCategory !== 'All') products = products.filter(p => p.category === currentCategory);
    hotDealsSec.classList.toggle('hidden', hotDeals.length === 0);
    trendingSec.classList.toggle('hidden', trending.length === 0);
    recentSec.classList.toggle('hidden', recent.length === 0);
    renderScrollingRow('hotDealsContainer', hotDeals, true);
    renderScrollingRow('trendingContainer', trending, false);
    renderScrollingRow('recentContainer', recent, false);
    info.textContent = `Found ${products.length} deals in ${currentCategory}`;
  }
  
  if (products.length === 0) { container.innerHTML = '<div class="text-center py-12 text-gray-500">No products found.</div>'; return; }
  
  groupedProducts = {};
  products.forEach(p => {
    const key = p.name;
    if (!groupedProducts[key]) {
      groupedProducts[key] = { ...p, prices: [], conditionGroups: { new: [], used: [], refurbished: [], auction: [] } };
    }
    (p.prices || [{ store: p.store, price: p.price, url: p.url, storeStatus: p.storeStatus || 'green', condition: p.condition || 'new', delivery: '2-3 days', stock: 'In Stock', bnpl: p.bnpl || [] }]).forEach(price => {
      groupedProducts[key].prices.push(price);
      const cond = price.condition || 'new';
      if (groupedProducts[key].conditionGroups[cond]) groupedProducts[key].conditionGroups[cond].push(price);
    });
    groupedProducts[key].prices.sort((a,b) => a.price - b.price);
  });
  
  container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">${Object.values(groupedProducts).map(p => {
    const best = p.prices[0];
    const bnplText = best.bnpl && best.bnpl.length ? `<div class="bnpl-badge mt-1">💳 BNPL available</div>` : '';
    const isHot = p.isHotDeal ? '<div class="hot-badge"><i class="fa-solid fa-fire"></i> HOT</div>' : '';
    return `<div class="bg-white rounded-xl shadow-sm overflow-hidden hover:shadow-md transition"><div class="relative"><img src="${p.image}" class="w-full h-36 object-cover" onerror="this.src='https://via.placeholder.com/400x300'">${isHot}<button onclick="toggleFavourite(${best.id||1})" class="absolute top-2 right-2 bg-white rounded-full p-1.5 shadow"><i class="fa-${favourites.includes(best.id)?'solid text-pink-500':'regular text-gray-400'} fa-heart text-sm"></i></button></div><div class="p-3"><h3 class="font-semibold text-sm mb-1">${p.name}</h3><div class="text-xs text-gray-500 mb-1">TOP 3 PRICES</div>${p.prices.slice(0,3).map(pr => `<div class="flex justify-between items-center text-xs mb-0.5"><span class="flex items-center gap-1"><span class="store-dot dot-${pr.storeStatus||'green'}"></span>${pr.store}</span><span class="font-bold">£${pr.price}</span></div>`).join('')}${bnplText}<button onclick="openProductModal('${p.name.replace(/'/g,"\'")}')" class="w-full py-2 bg-gray-900 text-white rounded-lg text-sm font-semibold mt-2">View All ${p.prices.length} Stores <i class="fa-solid fa-arrow-up-right-from-square text-xs ml-1"></i></button></div></div>`;
  }).join('')}</div>`;
}

function renderScrollingRow(containerId, items, isHot) {
  const el = document.getElementById(containerId);
  el.innerHTML = items.slice(0, 10).map(p => {
    const hotBadge = isHot ? '<div class="hot-badge"><i class="fa-solid fa-fire"></i> HOT</div>' : '';
    return `<div class="flex-shrink-0 w-48 bg-white rounded-lg overflow-hidden cursor-pointer" onclick="openProductModal('${p.name.replace(/'/g,"\'")}')"><div class="relative"><img src="${p.image}" class="w-full h-32 object-cover">${hotBadge}</div><div class="p-3"><div class="text-sm font-semibold text-gray-900 truncate">${p.name}</div><div class="text-xs text-gray-500 mb-1">TOP 3 PRICES</div><div class="text-lg font-bold text-gray-900">£${p.price}</div><button class="w-full mt-2 py-1.5 bg-gray-900 text-white rounded text-xs font-semibold">View Deal <i class="fa-solid fa-arrow-up-right-from-square"></i></button></div></div>`;
  }).join('');
}

function openProductModal(productName) {
  const product = groupedProducts[productName]; if (!product) return;
  if (!recentlyViewed.includes(product.id)) { recentlyViewed.unshift(product.id); if (recentlyViewed.length > 10) recentlyViewed.pop(); localStorage.setItem('recentlyViewed', JSON.stringify(recentlyViewed)); }
  const allPrices = Object.values(product.conditionGroups).flat();
  const filtered = activeConditionTab === 'all' ? allPrices : product.conditionGroups[activeConditionTab] || [];
  const sorted = [...filtered].sort((a,b) => a.price - b.price);
  const bestPrice = sorted[0]?.price || 0;
  const predictedPrice = Math.round(bestPrice * 0.93);
  const saving = bestPrice - predictedPrice;
  const confidence = 87;
  const tabCounts = { all: allPrices.length, new: product.conditionGroups.new.length, used: product.conditionGroups.used.length, refurbished: product.conditionGroups.refurbished.length, auction: product.conditionGroups.auction.length };
  
  const modalHtml = `
  <div class="p-6">
    <div class="flex justify-between items-start mb-4"><h2 class="text-2xl font-bold text-gray-900">${product.name}</h2><button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button></div>
    <div class="grid md:grid-cols-2 gap-6 mb-6">
      <div class="bg-gray-900 rounded-lg flex items-center justify-center h-80"><img src="${product.image}" class="max-h-full" onerror="this.src='https://via.placeholder.com/400x300'"></div>
      <div>
        <p class="text-gray-600 text-sm mb-4">Compare prices across all major UK retailers</p>
        <div class="ai-card mb-4">
          <div class="flex items-center gap-2 mb-2"><i class="fa-solid fa-brain text-blue-600"></i><span class="font-bold text-blue-900 text-sm">PriceSnap AI Prediction</span><span class="ml-auto text-xs bg-blue-600 text-white px-2 py-0.5 rounded-full">${confidence}% confident</span></div>
          <div class="mb-3"><div class="text-2xl font-bold text-gray-900">£${predictedPrice} <span class="text-sm font-normal text-gray-600">predicted in 30 days</span></div><div class="text-sm text-green-700 font-semibold">Save £${saving} if you wait • Current best: £${bestPrice}</div></div>
          <div class="mb-2"><div class="flex justify-between text-xs text-gray-600 mb-1"><span>Confidence</span><span>High</span></div><div class="confidence-bar"><div class="confidence-fill" style="width:${confidence}%"></div></div></div>
          <div class="flex gap-2 mt-3"><div class="flex-1 text-center p-2 bg-white rounded border"><div class="text-xs text-gray-500">Recommendation</div><div class="font-bold text-sm ${saving>50?'text-green-600':'text-orange-600'}">${saving>50?'WAIT':'BUY NOW'}</div></div><div class="flex-1 text-center p-2 bg-white rounded border"><div class="text-xs text-gray-500">Price Trend</div><div class="font-bold text-sm text-blue-600">↓ Falling</div></div></div>
          <p class="text-xs text-blue-700 mt-2">Based on 6-month history across ${allPrices.length} stores • Last updated 2 hours ago</p>
        </div>
        <button onclick="toggleWatch(${product.prices[0].id||1})" class="w-full py-2 border border-gray-900 text-gray-900 rounded-lg hover:bg-gray-900 hover:text-white text-sm font-semibold transition"><i class="fa-${watchlist.includes(product.prices[0].id)?'solid':'regular'} fa-eye mr-2"></i>${watchlist.includes(product.prices[0].id)?'Watching Price':'Watch Price'}</button>
      </div>
    </div>
    <div class="border-t pt-4">
      <div class="condition-tabs">
        <button onclick="switchConditionTab('${productName.replace(/'/g,"\'")}', 'all')" class="condition-tab ${activeConditionTab==='all'?'active':''}">All <span class="tab-count">${tabCounts.all}</span></button>
        ${tabCounts.new>0?`<button onclick="switchConditionTab('${productName.replace(/'/g,"\'")}', 'new')" class="condition-tab ${activeConditionTab==='new'?'active':''}">New <span class="tab-count">${tabCounts.new}</span></button>`:''}
        ${tabCounts.used>0?`<button onclick="switchConditionTab('${productName.replace(/'/g,"\'")}', 'used')" class="condition-tab ${activeConditionTab==='used'?'active':''}">Used <span class="tab-count">${tabCounts.used}</span></button>`:''}
        ${tabCounts.refurbished>0?`<button onclick="switchConditionTab('${productName.replace(/'/g,"\'")}', 'refurbished')" class="condition-tab ${activeConditionTab==='refurbished'?'active':''}">Refurbished <span class="tab-count">${tabCounts.refurbished}</span></button>`:''}
        ${tabCounts.auction>0?`<button onclick="switchConditionTab('${productName.replace(/'/g,"\'")}', 'auction')" class="condition-tab ${activeConditionTab==='auction'?'active':''}">Auction <span class="tab-count">${tabCounts.auction}</span></button>`:''}
      </div>
      <h3 class="text-lg font-bold text-gray-900 mb-3">Retailers Compared (${sorted.length})</h3>
      <div class="space-y-2">
        ${sorted.map((price,idx)=>`
          <div class="flex items-center justify-between p-3 rounded-lg ${idx===0?'bg-green-50 border-2 border-green-500':'bg-white border border-gray-200'}">
            <div class="flex items-center gap-3 flex-1">
              <span class="store-dot dot-${price.storeStatus||'green'}"></span>
              <div>
                <div class="font-semibold text-gray-900 text-sm">${price.store}</div>
                <div class="text-xs text-gray-500">${price.delivery||'2-3 days'} • ${price.stock||'In Stock'} • ${price.condition||'new'}${price.bnpl && price.bnpl.length ? ` • 💳 ${price.bnpl.join(', ')}` : ''}</div>
              </div>
            </div>
            <div class="text-right mr-3">
              <div class="text-xl font-bold text-gray-900">£${price.price}</div>
              ${price.oldPrice?`<div class="text-xs text-gray-400 line-through">£${price.oldPrice}</div>`:''}
            </div>
            <a href="${price.url||'#'}" target="_blank" class="px-4 py-2 ${idx===0?'bg-green-600':'bg-gray-900'} text-white rounded-lg hover:opacity-90 text-sm font-semibold whitespace-nowrap">Buy ${price.condition==='new'?'New':price.condition.charAt(0).toUpperCase()+price.condition.slice(1)} <i class="fa-solid fa-arrow-up-right-from-square text-xs ml-1"></i></a>
          </div>
        `).join('')}
      </div>
    </div>
  </div>`;
  document.getElementById('modalContent').innerHTML = modalHtml;
  document.getElementById('productModal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function switchConditionTab(productName, condition) { activeConditionTab = condition; openProductModal(productName); }
function closeModal(event) { if (!event || event.target.id === 'productModal') { document.getElementById('productModal').classList.add('hidden'); document.body.style.overflow = 'auto'; activeConditionTab = 'all'; } }
function toggleFavourite(id) { if (favourites.includes(id)) { favourites = favourites.filter(f => f !== id); } else { favourites.push(id); } localStorage.setItem('favourites', JSON.stringify(favourites)); renderProducts(); }
function toggleWatch(id) { if (watchlist.includes(id)) { watchlist = watchlist.filter(w => w !== id); } else { watchlist.push(id); } localStorage.setItem('watchlist', JSON.stringify(watchlist)); const prod = Object.values(groupedProducts).find(p => p.prices[0].id === id); if (prod) openProductModal(prod.name); }
function scrollRow(id, amount) { document.getElementById(id)?.scrollBy({ left: amount, behavior: 'smooth' }); }
</script>

</body></html>
