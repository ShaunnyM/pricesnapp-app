<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriceSnap - Global Price Comparison</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .store-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .dot-green { background: #10b981; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="productsContainer" class="p-6">
        <div class="text-center py-12 text-gray-500">Loading deals...</div>
    </div>

    <script>
        // 1. Setup Supabase
        const SUPABASE_URL = 'https://ecbewbncnzwvtkfbzlqm.supabase.co';
        const SUPABASE_KEY = 'YOUR_PUBLISHABLE_KEY_HERE'; // PASTE YOUR PUBLISHABLE KEY HERE

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allProducts = [];

        // 2. Load Products from Supabase
        async function loadProducts() {
            const container = document.getElementById('productsContainer');
            
            try {
                const { data, error } = await supabase.from('products').select('*');
                
                if (error) throw error;
                
                allProducts = data || [];
                renderProducts();
            } catch (err) {
                console.error("Error:", err);
                container.innerHTML = '<div class="text-center text-red-500">Failed to load products.</div>';
            }
        }

        // 3. Render function
        function renderProducts() {
            const container = document.getElementById('productsContainer');
            if (allProducts.length === 0) {
                container.innerHTML = '<div class="text-center">No products found.</div>';
                return;
            }

            container.innerHTML = allProducts.map(p => `
                <div class="bg-white p-4 rounded shadow mb-4">
                    <h2 class="text-xl font-bold">${p.name}</h2>
                    <p class="text-green-600 font-semibold">£${p.price}</p>
                </div>
            `).join('');
        }

        // Initialize
        loadProducts();
    </script>
</body>
</html>
